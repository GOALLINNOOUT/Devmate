name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3 pkg-config
          openssl_prefix="$(brew --prefix openssl@3)"
          echo "OPENSSL_DIR=$openssl_prefix" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$openssl_prefix/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$openssl_prefix/lib" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$openssl_prefix/include" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Windows smoke test
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\target\release\devmate.exe --help
          .\target\release\devmate.exe setup --json
          .\target\release\devmate.exe analyze --json
          .\target\release\devmate.exe doctor --json
          .\target\release\devmate.exe system --json

      - name: Unix smoke test
        if: runner.os != 'Windows'
        run: |
          ./target/release/devmate --help
          ./target/release/devmate setup --json
          ./target/release/devmate analyze --json
          ./target/release/devmate doctor --json
          ./target/release/devmate system --json
