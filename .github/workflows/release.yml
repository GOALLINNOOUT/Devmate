name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: devmate.exe
            archive: zip
          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: devmate
            archive: tar.gz
          - name: macOS Intel
            os: macos-13
            target: x86_64-apple-darwin
            binary: devmate
            archive: tar.gz
          - name: macOS Apple Silicon
            os: macos-14
            target: aarch64-apple-darwin
            binary: devmate
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3 pkg-config
          openssl_prefix="$(brew --prefix openssl@3)"
          echo "OPENSSL_DIR=$openssl_prefix" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$openssl_prefix/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$openssl_prefix/lib" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$openssl_prefix/include" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $target = "${{ matrix.target }}"
          $name = "devmate-$version-$target"
          New-Item -ItemType Directory -Path "dist\$name" | Out-Null
          Copy-Item "target\$target\release\devmate.exe" "dist\$name\devmate.exe"
          Copy-Item "README.md" "dist\$name\README.md"
          Copy-Item "LICENSE" "dist\$name\LICENSE"
          Copy-Item "CHANGELOG.md" "dist\$name\CHANGELOG.md"
          Compress-Archive -Path "dist\$name\*" -DestinationPath "dist\$name.zip" -Force
          Get-FileHash "dist\$name.zip" -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  $name.zip" } |
            Set-Content "dist\$name.zip.sha256"

      - name: Package Unix
        if: runner.os != 'Windows'
        run: |
          version="${{ github.ref_name }}"
          target="${{ matrix.target }}"
          name="devmate-$version-$target"
          mkdir -p "dist/$name"
          cp "target/$target/release/devmate" "dist/$name/devmate"
          cp README.md LICENSE CHANGELOG.md "dist/$name/"
          chmod +x "dist/$name/devmate"
          tar -czf "dist/$name.tar.gz" -C dist "$name"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/$name.tar.gz" > "dist/$name.tar.gz.sha256"
          else
            shasum -a 256 "dist/$name.tar.gz" > "dist/$name.tar.gz.sha256"
          fi

      - name: Smoke test Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\target\${{ matrix.target }}\release\devmate.exe --version
          .\target\${{ matrix.target }}\release\devmate.exe setup --json
          .\target\${{ matrix.target }}\release\devmate.exe doctor --json
          .\target\${{ matrix.target }}\release\devmate.exe system --json

      - name: Smoke test Unix binary
        if: runner.os != 'Windows'
        run: |
          ./target/${{ matrix.target }}/release/devmate --version
          ./target/${{ matrix.target }}/release/devmate setup --json
          ./target/${{ matrix.target }}/release/devmate doctor --json
          ./target/${{ matrix.target }}/release/devmate system --json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/*.sha256
          body_path: CHANGELOG.md
